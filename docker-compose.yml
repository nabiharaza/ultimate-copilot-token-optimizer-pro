services:
  dashboard:
    build: .
    image: trimp:latest
    command: ["trimp", "dashboard", "--mode", "web", "--host", "0.0.0.0", "--port", "7432", "--no-browser"]
    ports:
      - "7432:7432"
    volumes:
      - trimp-data:/home/trimp/.trimp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7432/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  proxy:
    build: .
    image: trimp:latest
    command: ["python3", "byok_server.py", "--host", "0.0.0.0", "--port", "8765"]
    ports:
      - "8765:8765"
    volumes:
      # Same volume as `dashboard` — both processes read/write the same
      # ~/.trimp/TrimP.db so compressions made through the proxy show up
      # in the dashboard immediately.
      - trimp-data:/home/trimp/.trimp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8765/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  trimp-data:
